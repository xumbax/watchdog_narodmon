<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Watchdog LED indicator panel mockup</title>
<desc>Three LEDs labeled WiFi, API, Fresh showing normal operating state, all lit</desc>
<rect x="0" y="0" width="320" height="180" fill="#1a1a1a" rx="14"/>
<rect x="20" y="20" width="280" height="140" fill="#0d0d0d" rx="8" stroke="#333" stroke-width="2"/>
<circle cx="90" cy="80" r="18" fill="#5dcaa5" stroke="#9fe1cb" stroke-width="2"/>
<circle cx="160" cy="80" r="18" fill="#5dcaa5" stroke="#9fe1cb" stroke-width="2"/>
<circle cx="230" cy="80" r="18" fill="#5dcaa5" stroke="#9fe1cb" stroke-width="2"/>
<text x="90" y="125" font-family="sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">LED1 WiFi</text>
<text x="160" y="125" font-family="sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">LED2 API</text>
<text x="230" y="125" font-family="sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">LED3 Fresh</text>
<text x="160" y="145" font-family="monospace" font-size="10" fill="#888888" text-anchor="middle">all on = everything is fine</text>
</svg>
